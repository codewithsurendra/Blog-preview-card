<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="blog-card">
    <img class="blog-card-img" src="/assets/images/illustration-article.svg" alt="Illustration article">
    <p class="blog-card-tag">Learning</p>
    <p class="blog-card-date">Published 21 Dec 2023</p>
    <h1 class="blog-card-title">HTML & CSS foundations</h1>
    <p class="blog-card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    <div class="blog-card-author"><img class="blog-card-avatar" src="/assets/images/image-avatar.webp" alt="Greg Hooper">
      <p class="blog-card-name">Greg Hooper</p>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Surendra</a>.
  </footer>
</body>

</html>
